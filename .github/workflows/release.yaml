name: Release

# Triggered when a GitHub Release is *published* (preferred), or manually
# dispatched. Uses PyPI Trusted Publishing (OIDC) - no API token required.
#
# Setup once:
#   1. https://pypi.org/manage/account/publishing/  → "Add a new pending
#      publisher" with:
#         PyPI Project Name : cnvturbo
#         Owner             : LogicByteCraft
#         Repository name   : cnvturbo
#         Workflow filename : release.yaml
#         Environment name  : pypi
#   2. GitHub → Settings → Environments → New environment "pypi"
#      (optional: add required reviewers for an extra approval step).
#   3. Bump the version by tagging a commit `vX.Y.Z` and create a GitHub
#      Release pointing at that tag (or run scripts/release.sh).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: "pypi"
        type: choice
        options:
          - pypi
          - testpypi

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required by hatch-vcs to derive version from tags
          filter: blob:none

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build deps
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Verify metadata with twine
        run: twine check --strict dist/*

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: cnvturbo-dist
          path: dist/
          retention-days: 14

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/cnvturbo
    permissions:
      id-token: write   # mandatory for Trusted Publishing
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: cnvturbo-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi' }}
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/cnvturbo
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: cnvturbo-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
